<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Binary avatar of Venkatakrishnan Ramesh</title>
  <desc id="desc">A stylized avatar made from glowing zeros and ones.</desc>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="bgDigits" width="54" height="28" patternUnits="userSpaceOnUse">
      <text x="0" y="11" font-family="monospace" font-size="10" fill="#0f5c8f">01001101</text>
      <text x="7" y="25" font-family="monospace" font-size="10" fill="#0a3555">10110100</text>
    </pattern>
    <pattern id="blueDigits" width="54" height="25" patternUnits="userSpaceOnUse">
      <rect width="54" height="25" fill="#071a2a"/>
      <text x="0" y="10" font-family="monospace" font-size="10" font-weight="700" fill="#31c4ff">01011010</text>
      <text x="4" y="23" font-family="monospace" font-size="10" font-weight="700" fill="#0798dd">10100101</text>
    </pattern>
    <pattern id="skinDigits" width="54" height="25" patternUnits="userSpaceOnUse">
      <rect width="54" height="25" fill="#4b2618"/>
      <text x="0" y="10" font-family="monospace" font-size="10" font-weight="700" fill="#ffd18d">10110010</text>
      <text x="5" y="23" font-family="monospace" font-size="10" font-weight="700" fill="#e79a52">01001101</text>
    </pattern>
    <pattern id="whiteDigits" width="54" height="25" patternUnits="userSpaceOnUse">
      <rect width="54" height="25" fill="#123047"/>
      <text x="0" y="10" font-family="monospace" font-size="10" font-weight="700" fill="#e9f8ff">01010110</text>
      <text x="5" y="23" font-family="monospace" font-size="10" font-weight="700" fill="#8fdcff">10101001</text>
    </pattern>
    <pattern id="darkDigits" width="54" height="25" patternUnits="userSpaceOnUse">
      <rect width="54" height="25" fill="#020a12"/>
      <text x="0" y="10" font-family="monospace" font-size="10" font-weight="700" fill="#0d6da8">11001010</text>
      <text x="5" y="23" font-family="monospace" font-size="10" font-weight="700" fill="#063d62">00110101</text>
    </pattern>
    <radialGradient id="halo" cx="50%" cy="46%" r="58%">
      <stop offset="0" stop-color="#0a79b8" stop-opacity=".28"/>
      <stop offset=".62" stop-color="#03263f" stop-opacity=".12"/>
      <stop offset="1" stop-color="#01060b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="520" height="520" rx="34" fill="#02070d"/>
  <rect width="520" height="520" rx="34" fill="url(#halo)"/>
  <rect x="12" y="12" width="496" height="496" rx="26" fill="url(#bgDigits)" opacity=".38"/>

