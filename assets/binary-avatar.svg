    <path d="M337 300c29 13 46 45 50 87 3 32-2 55-22 63-18 7-31-4-36-22l-22-92z" fill="url(#whiteDigits)" stroke="#88ddff" stroke-width="2"/>
    <path d="M148 366l48 13M143 390l48 12M372 366l-48 13M377 390l-48 12" stroke="#071622" stroke-width="10"/>
