    <path d="M211 284c8 28 22 42 49 42 28 0 43-14 50-42" fill="none" stroke="#c7f1ff" stroke-width="5"/>
    <path d="M230 287l-9 71M290 287l9 71" fill="none" stroke="#dff8ff" stroke-width="3"/>
    <circle cx="220" cy="360" r="4" fill="#dff8ff"/>
    <circle cx="300" cy="360" r="4" fill="#dff8ff"/>
