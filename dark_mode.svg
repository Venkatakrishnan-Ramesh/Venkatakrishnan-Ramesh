<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Venkatakrishnan Ramesh profile card</title>
  <desc id="desc">A dark mode SVG profile card with a stylized portrait, engineering focus areas, selected projects, and contact links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#061018"/>
      <stop offset="48%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#10251b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="55%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.62 0 0 0 0 1 0 0 0 .38 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <clipPath id="avatarClip">
      <rect x="112" y="104" width="352" height="352" rx="30"/>
    </clipPath>
    <style>
      .label{font:700 18px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace;letter-spacing:.16em;text-transform:uppercase}
      .title{font:800 70px Georgia,serif;letter-spacing:-1.8px}
      .subtitle{font:500 26px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .copy{font:500 23px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .small{font:600 18px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .tiny{font:700 15px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace;letter-spacing:.08em}
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="1020" cy="50" r="260" fill="#238636" opacity=".12"/>
  <circle cx="88" cy="660" r="250" fill="#58a6ff" opacity=".11"/>
  <path d="M0 130 C260 70 410 220 640 150 S1000 40 1280 120" fill="none" stroke="#58a6ff" stroke-width="2" opacity=".25"/>
  <path d="M0 620 C320 560 470 710 700 640 S1010 535 1280 650" fill="none" stroke="#238636" stroke-width="2" opacity=".25"/>

  <rect x="54" y="48" width="1172" height="664" rx="38" fill="#0d1117" opacity=".78" stroke="#30363d" stroke-width="2"/>
  <rect x="82" y="76" width="412" height="608" rx="30" fill="#010409" stroke="#30363d"/>
  <rect x="112" y="104" width="352" height="352" rx="30" fill="#0d1117" stroke="#238636" stroke-width="2"/>
  <image href="assets/alphabet-avatar.svg" x="112" y="104" width="352" height="352" preserveAspectRatio="xMidYMid slice" clip-path="url(#avatarClip)"/>
  <rect x="112" y="104" width="352" height="352" rx="30" fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>

  <text x="112" y="507" fill="#8b949e" class="label">Current signal</text>
  <text x="112" y="548" fill="#f0f6fc" class="copy">IT Associate Engineer - QA</text>
  <text x="112" y="583" fill="#c9d1d9" class="small">Palo Alto Networks / Bengaluru</text>
  <text x="112" y="633" fill="#7ee787" class="small">Code. Test. Measure. Improve.</text>

  <g transform="translate(548 106)">
    <text x="0" y="0" fill="#7ee787" class="label">github.com/Venkatakrishnan-Ramesh</text>
    <text x="0" y="86" fill="#f0f6fc" class="title">Venkatakrishnan</text>
    <text x="0" y="154" fill="#f0f6fc" class="title">Ramesh</text>
    <text x="0" y="209" fill="#58a6ff" class="subtitle">AI-focused software engineer</text>
    <text x="0" y="246" fill="#58a6ff" class="subtitle">automation / cloud security / ML systems</text>
    <text x="0" y="294" fill="#c9d1d9" class="copy">I build reliable release systems, ML products,</text>
    <text x="0" y="328" fill="#c9d1d9" class="copy">security tooling, and agentic workflows.</text>
  </g>

  <g transform="translate(548 440)">
    <rect x="0" y="0" width="202" height="78" rx="22" fill="#161b22" stroke="#30363d"/>
    <text x="24" y="32" fill="#8b949e" class="tiny">FOCUS</text>
    <text x="24" y="59" fill="#f0f6fc" class="small">Automation</text>

    <rect x="230" y="0" width="202" height="78" rx="22" fill="#161b22" stroke="#30363d"/>
    <text x="254" y="32" fill="#8b949e" class="tiny">RESEARCH</text>
    <text x="254" y="59" fill="#f0f6fc" class="small">Cloud IAM</text>

    <rect x="460" y="0" width="202" height="78" rx="22" fill="#161b22" stroke="#30363d"/>
    <text x="484" y="32" fill="#8b949e" class="tiny">SYSTEMS</text>
    <text x="484" y="59" fill="#f0f6fc" class="small">LLM evals</text>
  </g>

  <g transform="translate(548 555)">
    <text x="0" y="0" fill="#8b949e" class="label">Selected work</text>
    <text x="0" y="45" fill="#f0f6fc" class="copy">OperationalML / bug2Patch / GymAI / EHRKIT</text>
    <text x="0" y="88" fill="#7ee787" class="small">venkatakrishnanramesh.netlify.app</text>
    <text x="0" y="124" fill="#58a6ff" class="small">linkedin.com/in/venkatakrishnan-ramesh-997409214</text>
  </g>
</svg>
