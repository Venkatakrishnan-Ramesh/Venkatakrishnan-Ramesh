<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Venkatakrishnan Ramesh profile card</title>
  <desc id="desc">A light mode SVG profile card with a stylized portrait, engineering focus areas, selected projects, and contact links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f8fa"/>
      <stop offset="52%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#edf8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#0969da"/>
      <stop offset="55%" stop-color="#1a7f37"/>
      <stop offset="100%" stop-color="#9a6700"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f2328" flood-opacity=".14"/>
    </filter>
    <style>
      .label{font:700 18px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace;letter-spacing:.16em;text-transform:uppercase}
      .title{font:800 70px Georgia,serif;letter-spacing:-1.8px}
      .subtitle{font:500 26px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .copy{font:500 23px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .small{font:600 18px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace}
      .tiny{font:700 15px ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace;letter-spacing:.08em}
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="1040" cy="44" r="260" fill="#1a7f37" opacity=".13"/>
  <circle cx="88" cy="670" r="250" fill="#0969da" opacity=".12"/>
  <path d="M0 128 C260 70 410 220 640 150 S1000 40 1280 120" fill="none" stroke="#0969da" stroke-width="2" opacity=".28"/>
  <path d="M0 620 C320 560 470 710 700 640 S1010 535 1280 650" fill="none" stroke="#1a7f37" stroke-width="2" opacity=".28"/>

  <rect x="54" y="48" width="1172" height="664" rx="38" fill="#ffffff" stroke="#d0d7de" stroke-width="2" filter="url(#shadow)"/>
  <rect x="82" y="76" width="412" height="608" rx="30" fill="#f6f8fa" stroke="#d0d7de"/>
  <rect x="112" y="104" width="352" height="352" rx="30" fill="#0d1117" stroke="#1a7f37" stroke-width="2"/>
  <image href="assets/binary-avatar.svg" x="112" y="104" width="352" height="352" preserveAspectRatio="xMidYMid meet"/>
  <rect x="112" y="104" width="352" height="352" rx="30" fill="none" stroke="url(#accent)" stroke-width="4"/>

  <text x="112" y="507" fill="#57606a" class="label">Current signal</text>
  <text x="112" y="548" fill="#24292f" class="copy">IT Associate Engineer - QA</text>
  <text x="112" y="583" fill="#57606a" class="small">Palo Alto Networks / Bengaluru</text>
  <text x="112" y="633" fill="#1a7f37" class="small">Code. Test. Measure. Improve.</text>

  <g transform="translate(548 106)">
    <text x="0" y="0" fill="#1a7f37" class="label">github.com/Venkatakrishnan-Ramesh</text>
    <text x="0" y="86" fill="#24292f" class="title">Venkatakrishnan</text>
    <text x="0" y="154" fill="#24292f" class="title">Ramesh</text>
    <text x="0" y="209" fill="#0969da" class="subtitle">AI-focused software engineer</text>
    <text x="0" y="246" fill="#0969da" class="subtitle">automation / cloud security / ML systems</text>
    <text x="0" y="294" fill="#57606a" class="copy">I build reliable release systems, ML products,</text>
    <text x="0" y="328" fill="#57606a" class="copy">security tooling, and agentic workflows.</text>
  </g>

  <g transform="translate(548 440)">
    <rect x="0" y="0" width="202" height="78" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="24" y="32" fill="#57606a" class="tiny">FOCUS</text>
    <text x="24" y="59" fill="#24292f" class="small">Automation</text>

    <rect x="230" y="0" width="202" height="78" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="254" y="32" fill="#57606a" class="tiny">RESEARCH</text>
    <text x="254" y="59" fill="#24292f" class="small">Cloud IAM</text>

    <rect x="460" y="0" width="202" height="78" rx="22" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="484" y="32" fill="#57606a" class="tiny">SYSTEMS</text>
    <text x="484" y="59" fill="#24292f" class="small">LLM evals</text>
  </g>

  <g transform="translate(548 555)">
    <text x="0" y="0" fill="#57606a" class="label">Selected work</text>
    <text x="0" y="45" fill="#24292f" class="copy">OperationalML / bug2Patch / GymAI / EHRKIT</text>
    <text x="0" y="88" fill="#1a7f37" class="small">venkatakrishnanramesh.netlify.app</text>
    <text x="0" y="124" fill="#0969da" class="small">linkedin.com/in/venkatakrishnan-ramesh-997409214</text>
  </g>
</svg>
